project_name: devmem

builds:
  - id: devmem
    binary: devmem
    main: .
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Surya-sourav
    name: DevMem